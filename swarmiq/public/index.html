<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SwarmIQ v2 Premium</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="particles-js"></div>
    
    <div class="glass-container">
        <header>
            <h1>SwarmIQ <span class="badge">v2</span></h1>
            <p>Multi-Agent Research Intelligence</p>
        </header>

        <main>
            <div class="input-section">
                <input type="text" id="query-input" placeholder="Enter your research query...">
                <select id="domain-mode">
                    <option value="research">Research</option>
                    <option value="business">Business</option>
                    <option value="policy">Policy</option>
                </select>
                <button id="run-btn">Deploy Agents</button>
            </div>

            <div class="dashboard">
                <div class="activity-feed glass-panel">
                    <h3>Live Agent Activity</h3>
                    <div id="activity-log"></div>
                </div>
                
                <div class="report-view glass-panel">
                    <h3>Final Report</h3>
                    <div id="report-content"><i>Run a query to see the report generated by SwarmIQ.</i></div>
                </div>
            </div>
            
            <div class="metrics-panel glass-panel" id="metrics-panel" style="display: none; margin-top: 20px;">
                <h3>Quality Metrics</h3>
                <div id="metrics-content"></div>
            </div>
        </main>
    </div>

    <!-- tsParticles -->
    <script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>
    <script src="/js/main.js"></script>
</body>
</html>
